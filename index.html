<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FANG的第一个网页</title>
    <style>
        /* 这里是 CSS：负责让网页变漂亮 */
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 300px;
        }
        h1 { color: #333; }
        p { color: #666; }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h1>你好，世界！</h1>
        <p>这是FANG用 HTML 编码制作的第一个测试网站。</p>
        <button onclick="showMessage()">点我一下</button>
    </div>

    <script>
        /* 这里是 JavaScript：负责互动功能 */
        function showMessage() {
            alert("恭喜！你的 HTML 测试成功了！");
        }
    </script>

</body>
</html>
