<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FANG的第一个网页</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #2c3e50; /* 深色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            
            /* --- 核心修改：并排布局 --- */
            display: flex;       /* 开启弹性布局 */
            flex-direction: row; /* 水平排列（想改图片在右，就把这里改成 row-reverse） */
            align-items: center; /* 垂直居中对齐 */
            gap: 25px;           /* 图片和文字之间的间距 */
            
            max-width: 500px;    /* 稍微拉宽一点，给并排留空间 */
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 10px; /* 稍微带点圆角，不一定要正圆 */
            object-fit: cover;   /* 确保图片不被拉伸 */
            flex-shrink: 0;      /* 防止图片被文字挤小 */
        }

        .text-content {
            text-align: left;    /* 文字左对齐 */
        }

        h1 { color: #333; margin-top: 0; font-size: 1.5rem; }
        p { color: #666; line-height: 1.6; }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <img src="test.jpg" alt="我的图片">
        
        <div class="text-content">
            <h1>你好，世界！</h1>
            <p>这是FANG用 HTML 编码制作的第一个测试网站。</p>
            <button onclick="showMessage()">点我一下</button>
        </div>
    </div>

    <script>
        function showMessage() {
            alert("恭喜！你的 HTML 测试成功了！");
        }
    </script>

</body>
</html>
